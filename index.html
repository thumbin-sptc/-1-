<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어울림1반 수업 설계 도구</title>
<style>
  :root {
    --teal:#1D9E75;--tl:#E1F5EE;--td:#085041;
    --blue:#378ADD;--bl:#E6F1FB;--bd:#0C447C;
    --amber:#EF9F27;--al:#FAEEDA;--ad:#633806;
    --purple:#7F77DD;--pl:#EEEDFE;--pd:#3C3489;
    --g50:#F8F7F4;--g100:#F1EFE8;--g200:#D3D1C7;
    --g400:#888780;--g600:#5F5E5A;--g900:#2C2C2A;
    --rsm:6px;--rmd:10px;--rlg:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--g50);color:var(--g900);min-height:100vh}

  .hd{background:#fff;border-bottom:1px solid var(--g200);padding:0 1.25rem;height:52px;display:flex;align-items:center;position:sticky;top:0;z-index:100}
  .hd-mark{width:28px;height:28px;background:var(--teal);border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:9px}
  .hd-mark svg{width:15px;height:15px}
  .hd-t{font-size:13px;font-weight:700;letter-spacing:-.3px}
  .hd-s{font-size:11px;color:var(--g400)}

  .main{max-width:820px;margin:0 auto;padding:1.25rem 1rem 5rem}

  .prog{display:flex;background:#fff;border:1px solid var(--g200);border-radius:var(--rmd);overflow:hidden;margin-bottom:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .pi{flex:1;padding:10px 12px;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--g400);border-right:1px solid var(--g200);cursor:default;transition:background .2s,color .2s}
  .pi:last-child{border-right:none}
  .pi.active{background:var(--tl);color:var(--td);font-weight:600}
  .pi.done{color:var(--teal);cursor:pointer}
  .pi.done:hover{background:var(--tl)}
  .pn{width:19px;height:19px;border-radius:50%;background:var(--g200);color:var(--g600);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .pi.active .pn,.pi.done .pn{background:var(--teal);color:#fff}
  .pl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media(max-width:480px){.pl{display:none}.pi{justify-content:center}}

  .card{background:#fff;border:1px solid var(--g200);border-radius:var(--rlg);padding:1.1rem 1.2rem;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:.875rem;animation:fup .2s ease}
  @keyframes fup{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .ct2{font-size:14px;font-weight:700;margin-bottom:3px}
  .cd{font-size:13px;color:var(--g600);margin-bottom:1rem}

  /* 주차 그리드 */
  .week-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:7px}
  .wbtn{padding:10px;border:1.5px solid var(--g200);border-radius:var(--rmd);background:#fff;cursor:pointer;font-family:inherit;text-align:left;transition:all .12s}
  .wbtn:hover{border-color:var(--g400);background:var(--g50)}
  .wbtn.sel{border-color:var(--teal);background:var(--tl)}
  .wn{font-size:10px;font-weight:700;color:var(--g400);margin-bottom:1px}
  .wbtn.sel .wn{color:var(--teal)}
  .wp{font-size:12px;font-weight:600}
  .wbtn.sel .wp{color:var(--td)}
  .tbadge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;margin-top:3px}
  .tb-나{background:#EEEDFE;color:#3C3489}
  .tb-가족{background:#FAEEDA;color:#633806}
  .tb-우리동네{background:#E6F1FB;color:#0C447C}
  .tb-환경{background:#EAF3DE;color:#27500A}
  .tb-환경보호{background:#EAF3DE;color:#27500A}
  .tb-생명{background:#FAECE7;color:#993C1D}

  .divider{height:1px;background:var(--g200);margin:.875rem 0}

  /* 교과 선택 */
  .subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:480px){.subj-grid{grid-template-columns:1fr}}
  .grade-block{background:var(--g50);border:1px solid var(--g200);border-radius:var(--rmd);padding:.875rem}
  .grade-title{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px}
  .gdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .srow{display:flex;gap:5px;flex-wrap:wrap}
  .sbtn{padding:5px 12px;border-radius:var(--rsm);border:1.5px solid var(--g200);background:#fff;cursor:pointer;font-size:12px;font-family:inherit;color:var(--g600);font-weight:500;transition:all .12s}
  .sbtn:hover{border-color:var(--g400);color:var(--g900)}
  .sbtn.g1s{border-color:var(--teal);background:var(--tl);color:var(--td)}
  .sbtn.g3s{border-color:var(--blue);background:var(--bl);color:var(--bd)}

  /* 차시 목록 */
  .tc{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.tc{grid-template-columns:1fr}}
  .chd{font-size:11px;font-weight:700;padding:5px 9px;border-radius:var(--rsm);margin-bottom:6px}
  .chd.g1{background:var(--tl);color:var(--td)}
  .chd.g3{background:var(--bl);color:var(--bd)}
  .slist{max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;padding-right:1px}
  .slist::-webkit-scrollbar{width:3px}
  .slist::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px}
  .li{display:flex;gap:8px;align-items:flex-start;padding:7px 9px;border:1.5px solid var(--g200);border-radius:var(--rsm);cursor:pointer;transition:all .1s;background:#fff}
  .li:hover{border-color:var(--g400);background:var(--g50)}
  .li.g1s{border-color:var(--teal);background:var(--tl)}
  .li.g3s{border-color:var(--blue);background:var(--bl)}
  .chk{width:15px;height:15px;border:2px solid var(--g200);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .1s}
  .li.g1s .chk{background:var(--teal);border-color:var(--teal)}
  .li.g3s .chk{background:var(--blue);border-color:var(--blue)}
  .tick{width:7px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:none}
  .li.g1s .tick,.li.g3s .tick{display:block}
  .li-u{font-size:10px;color:var(--g400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .li-t{font-size:12px;font-weight:600;line-height:1.35}
  .li-c{font-size:11px;color:var(--g400);margin-top:1px}
  .li.g1s .li-u,.li.g1s .li-c{color:var(--teal)}
  .li.g3s .li-u,.li.g3s .li-c{color:var(--bd);opacity:.7}

  /* 학생 */
  .sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:7px}
  .sbtn2{display:flex;align-items:center;gap:8px;padding:9px 10px;border:1.5px solid var(--g200);border-radius:var(--rmd);background:#fff;cursor:pointer;font-family:inherit;text-align:left;transition:all .12s}
  .sbtn2:hover,.sbtn2.sel{border-color:var(--amber);background:var(--al)}
  .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
  .avt{background:#9FE1CB;color:var(--td)}
  .ava{background:#FAC775;color:var(--ad)}
  .avp{background:#F4C0D1;color:#72243E}
  .avb{background:#B5D4F4;color:var(--bd)}
  .avy{background:#CEB9F0;color:#3C3489}
  .avg{background:#C0DD97;color:#27500A}
  .sn{font-size:13px;font-weight:600}
  .sm{font-size:11px;color:var(--g600)}
  .aac-pill{display:inline-block;font-size:10px;padding:1px 5px;border-radius:99px;background:var(--pl);color:var(--pd);font-weight:600;margin-top:2px}
  .ilist{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .iitem{background:var(--pl);border-left:3px solid var(--purple);border-radius:0 var(--rsm) var(--rsm) 0;padding:7px 11px}
  .iname{font-size:11px;font-weight:700;color:var(--pd);margin-bottom:1px}
  .itext{font-size:12px;color:var(--g600);line-height:1.6}

  /* 칩 */
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;font-size:11px;padding:3px 8px;border-radius:99px;font-weight:500}
  .ct{background:var(--tl);color:var(--td)}
  .cb{background:var(--bl);color:var(--bd)}
  .ca{background:var(--al);color:var(--ad)}
  .cw{background:var(--g100);color:var(--g600)}

  /* 버튼 */
  .brow{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;gap:7px}
  .bp{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;background:var(--teal);color:#fff;border:none;border-radius:var(--rsm);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
  .bp:hover{background:var(--td);transform:translateY(-1px)}
  .bp:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed;transform:none}
  .bg{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:#fff;color:var(--g600);border:1px solid var(--g200);border-radius:var(--rsm);cursor:pointer;font-size:12px;font-family:inherit;transition:all .12s}
  .bg:hover{background:var(--g100)}

  /* 4단계 결과 */
  .result-box{
    background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--rmd);
    padding:1rem 1.1rem;font-size:13px;line-height:1.85;color:var(--g600);
    white-space:pre-wrap;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    max-height:420px;overflow-y:auto;
  }
  .result-box::-webkit-scrollbar{width:4px}
  .result-box::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px}

  .copy-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
  .copy-btn-big{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;padding:13px;font-size:14px;font-weight:700;
    background:var(--teal);color:#fff;border:none;border-radius:var(--rmd);
    cursor:pointer;font-family:inherit;transition:all .15s;
    box-shadow:0 3px 10px rgba(29,158,117,.25);
  }
  .copy-btn-big:hover{background:var(--td);transform:translateY(-1px);box-shadow:0 6px 16px rgba(29,158,117,.3)}
  .copy-btn-big.done{background:#fff;color:var(--teal);border:1.5px solid var(--teal);box-shadow:none;transform:none}

  .open-btn{
    display:flex;align-items:center;justify-content:center;gap:7px;
    width:100%;padding:10px;font-size:13px;font-weight:600;
    background:#fff;color:var(--bd);border:1.5px solid var(--blue);
    border-radius:var(--rmd);cursor:pointer;font-family:inherit;transition:all .15s;
  }
  .open-btn:hover{background:var(--bl)}

  .how-box{
    background:var(--al);border:1px solid #FAC775;border-radius:var(--rmd);
    padding:10px 13px;font-size:13px;color:var(--ad);line-height:1.7;
    display:flex;gap:8px;align-items:flex-start;
  }
  .slabel{font-size:11px;font-weight:700;color:var(--g400);letter-spacing:.5px;margin-bottom:7px}
</style>
</head>
<body>

<header class="hd">
  <div class="hd-mark">
    <svg viewBox="0 0 15 15" fill="none">
      <rect x="2" y="2" width="4.5" height="4.5" rx="1.2" fill="white" opacity=".9"/>
      <rect x="8.5" y="2" width="4.5" height="4.5" rx="1.2" fill="white" opacity=".55"/>
      <rect x="2" y="8.5" width="4.5" height="4.5" rx="1.2" fill="white" opacity=".55"/>
      <rect x="8.5" y="8.5" width="4.5" height="4.5" rx="1.2" fill="white" opacity=".9"/>
    </svg>
  </div>
  <div>
    <div class="hd-t">어울림1반 수업 설계 도구</div>
    <div class="hd-s">2026-1 · 1·3학년 혼합 특수학급</div>
  </div>
</header>

<main class="main">
  <nav class="prog">
    <div class="pi active" id="pi1" onclick="jmp(1)"><div class="pn" id="pn1">1</div><span class="pl">주차·교과</span></div>
    <div class="pi" id="pi2" onclick="jmp(2)"><div class="pn" id="pn2">2</div><span class="pl">차시 선택</span></div>
    <div class="pi" id="pi3" onclick="jmp(3)"><div class="pn" id="pn3">3</div><span class="pl">학생 선택</span></div>
    <div class="pi" id="pi4" onclick="jmp(4)"><div class="pn" id="pn4">4</div><span class="pl">Claude에게</span></div>
  </nav>
  <div id="sc"></div>
</main>

   '1학년_수학':[{u:'1. 9까지의 수',t:'순서 말하기·수의 순서 알기',c:'수의 순서'},{u:'1. 9까지의 수',t:'1만큼 더 크고 작은 수',c:'1만큼 더 크고 작은 수'}],

  {w:3,p:'5.4-5.8',theme:'나',

   '3학년_수학':[{u:'1. 덧셈과 뺄셈',t:'받아내림이 없는·한 번·두 번 있는 (세 자리 수)-(세 자리 수)',c:'세 자리 수 뺄셈'}],
   '3학년_사회':[{u:'1. 우리가 사는 곳',t:'주변의 장소 떠올리기·경험과 느낌 다양하게 표현',c:'장소 경험 표현'}],

let S={step:1,week:null,g1s:null,g3s:null,g1l:[],g3l:[],stus:[]};

/* ── 진행 표시 ── */
function updProg(){
  for(let i=1;i<=4;i++){
    const p=document.getElementById("pi"+i),n=document.getElementById("pn"+i);
    p.className="pi";
    if(i<S.step){p.classList.add("done");n.textContent="✓";}
    else if(i===S.step){p.classList.add("active");n.textContent=i;}
    else n.textContent=i;
  }
}

/* ── 렌더링 ── */
function render(){
  updProg();
  const c=document.getElementById("sc");
  if(S.step===1) c.innerHTML=r1();
  else if(S.step===2) c.innerHTML=r2();
  else if(S.step===3) c.innerHTML=r3();
  else c.innerHTML=r4();
}

/* ── STEP 1: 주차 + 교과 ── */
function r1(){
  const wd=SCHED.find(x=>x.w===S.week);
  const weekBtns=SCHED.map(w=>{
    const tc=TC[w.theme]||'나';
    return`<button class="wbtn ${S.week===w.w?'sel':''}" onclick="selWeek(${w.w})">
      <div class="wn">${w.w}주차</div>
      <div class="wp">${w.p}</div>
      <div><span class="tbadge tb-${tc}">${w.theme}</span></div>
    </button>`;
  }).join('');

  let subjHtml='';
  if(wd){
    const g1K=Object.keys(wd).filter(k=>k.startsWith('1학년_'));
    const g3K=Object.keys(wd).filter(k=>k.startsWith('3학년_'));
    subjHtml=`
    <div class="divider"></div>
    <div class="ct2" style="margin-bottom:.5rem">${S.week}주차 교과 선택</div>
    <div class="cd">이 주에 다루는 교과 중 융합할 교과를 학년별로 하나씩 선택하세요.</div>
    <div class="subj-grid">
      <div class="grade-block">
        <div class="grade-title"><span class="gdot" style="background:var(--teal)"></span>1학년</div>
        <div class="srow">${g1K.map(k=>`<button class="sbtn ${S.g1s===k?'g1s':''}" onclick="selSubj(1,'${k}')">${k.replace('1학년_','')}</button>`).join('')}</div>
      </div>
      <div class="grade-block">
        <div class="grade-title"><span class="gdot" style="background:var(--blue)"></span>3학년</div>
        <div class="srow">${g3K.map(k=>`<button class="sbtn ${S.g3s===k?'g3s':''}" onclick="selSubj(3,'${k}')">${k.replace('3학년_','')}</button>`).join('')}</div>
      </div>
    </div>
    ${S.g1s&&S.g3s?`<div class="divider"></div>
    <div class="chips">
      <span class="chip ct">1학년 ${S.g1s.replace('1학년_','')}</span>
      <span style="color:var(--g400);font-size:16px;align-self:center">+</span>
      <span class="chip cb">3학년 ${S.g3s.replace('3학년_','')}</span>
    </div>`:''}`;
  }

  return`<div class="card">
    <div class="ct2">수업 기간 선택</div>
    <div class="cd">수업할 주차를 선택하면 그 주에 진행하는 교과가 표시됩니다.</div>
    <div class="week-grid">${weekBtns}</div>
    ${subjHtml}
    <div class="brow"><div></div>
      <button class="bp" ${S.week&&S.g1s&&S.g3s?'':'disabled'} onclick="goTo(2)">차시 선택 →</button>
    </div>
  </div>`;}

/* ── STEP 2: 차시 ── */
function r2(){
  const wd=SCHED.find(x=>x.w===S.week);
  const g1d=wd?.[S.g1s]||[], g3d=wd?.[S.g3s]||[];
  const mkL=(d,g)=>d.length
    ?d.map((l,i)=>`<div class="li ${g===1&&S.g1l.includes(i)?'g1s':g===3&&S.g3l.includes(i)?'g3s':''}" onclick="togL(${g},${i})">
        <div class="chk"><div class="tick"></div></div>
        <div style="flex:1;min-width:0">
          <div class="li-u">${l.u}</div>
          <div class="li-t">${l.t}</div>
          <div class="li-c">${l.c}</div>
        </div>
      </div>`).join('')
    :`<div style="font-size:12px;color:var(--g400);padding:8px">이 주차에 해당 교과 없음</div>`;

  return`<div class="card" style="margin-bottom:.5rem">
    <div class="slabel">선택된 주차</div>
    <div class="chips">
      <span class="chip cw">${S.week}주차 (${wd?.p}) · ${wd?.theme}</span>
      <span class="chip ct">1학년 ${S.g1s?.replace('1학년_','')}</span>
      <span class="chip cb">3학년 ${S.g3s?.replace('3학년_','')}</span>
    </div>
  </div>
  <div class="card">
    <div class="ct2">차시 선택</div>
    <div class="cd">이 주에 다루는 내용 중 연계할 차시를 각 학년에서 선택하세요. 억지로 묶어도 괜찮아요.</div>
    <div class="tc">
      <div>
        <div class="chd g1">1학년 ${S.g1s?.replace('1학년_','')} (${S.g1l.length}선택)</div>
        <div class="slist">${mkL(g1d,1)}</div>
      </div>
      <div>
        <div class="chd g3">3학년 ${S.g3s?.replace('3학년_','')} (${S.g3l.length}선택)</div>
        <div class="slist">${mkL(g3d,3)}</div>
      </div>
    </div>
    <div class="brow">
      <button class="bg" onclick="goTo(1)">← 이전</button>
      <button class="bp" ${S.g1l.length&&S.g3l.length?'':'disabled'} onclick="goTo(3)">학생 선택 →</button>

        <div><div class="sn">${s.id}</div><div class="sm">${s.g}학년${s.d?' · '+s.d:''}</div>${s.aac?`<div class="aac-pill">AAC</div>`:''}</div>

    <div class="brow">
      <button class="bg" onclick="goTo(2)">← 이전</button>
      <button class="bp" ${S.stus.length?'':'disabled'} onclick="goTo(4)">프롬프트 생성 →</button>
    </div>
  </div>`;}

/* ── STEP 4: 프롬프트 복사 ── */
function r4(){
  const wd=SCHED.find(x=>x.w===S.week);
  const g1L=S.g1l.map(i=>wd?.[S.g1s]?.[i]).filter(Boolean);
  const g3L=S.g3l.map(i=>wd?.[S.g3s]?.[i]).filter(Boolean);
  const ss=STUS.filter(x=>S.stus.includes(x.id));
  const prompt=buildPrompt(wd,g1L,g3L,ss);

  return`
  <div class="card" style="margin-bottom:.5rem">
    <div class="slabel">요약</div>
    <div class="chips">
      <span class="chip cw">${S.week}주차 (${wd?.p}) · ${wd?.theme}</span>
      ${g1L.map(l=>`<span class="chip ct">1학년 ${S.g1s?.replace('1학년_','')} · ${l.t}</span>`).join('')}
      ${g3L.map(l=>`<span class="chip cb">3학년 ${S.g3s?.replace('3학년_','')} · ${l.t}</span>`).join('')}
      ${ss.map(s=>`<span class="chip ca">${s.id}</span>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="ct2" style="margin-bottom:.75rem">Claude에게 붙여넣기</div>

    <div class="copy-wrap">
      <button class="copy-btn-big" id="cpBtn" onclick="doCopy()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="white" stroke-width="1.5"/><path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5" stroke="white" stroke-width="1.5"/></svg>
        프롬프트 복사
      </button>
      <a class="open-btn" href="https://claude.ai" target="_blank">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M9 4l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        claude.ai 열기
      </a>
    </div>

    <div class="how-box">
      <span style="font-size:16px;flex-shrink:0">💡</span>
      <span>위 버튼으로 프롬프트를 복사한 뒤, claude.ai 새 대화에 붙여넣기 하세요. Claude가 수업 활동·IEP 삽입·AAC 장면·성취기준을 설계해드립니다.</span>
    </div>

    <div style="margin-top:1rem">
      <div class="slabel">복사될 내용 미리보기</div>
      <div class="result-box">${escHtml(prompt)}</div>
    </div>

    <div class="brow">
      <button class="bg" onclick="goTo(3)">← 이전</button>
      <button class="bg" onclick="resetAll()">처음부터</button>
    </div>
  </div>`;}

/* ── 프롬프트 생성 ── */
function buildPrompt(wd,g1L,g3L,ss){
  let m='[어울림1반 특수학급 융합 수업 설계 요청]\n\n';
  m+=`■ 수업 주차: ${S.week}주차 (${wd?.p||''}) / 생활주제: ${wd?.theme||''}\n\n`;
  m+=`■ 1학년 ${S.g1s?.replace('1학년_','')} 연계 차시:\n`;
  g1L.forEach(l=>m+=`  · [${l.u}] ${l.t}\n    학습 내용: ${l.c}\n`);
  m+=`\n■ 3학년 ${S.g3s?.replace('3학년_','')} 연계 차시:\n`;
  g3L.forEach(l=>m+=`  · [${l.u}] ${l.t}\n    학습 내용: ${l.c}\n`);
  m+=`\n■ 참여 학생 및 IEP:\n`;
  ss.forEach(s=>{
    m+=`  · ${s.id} (${s.g}학년${s.d?', '+s.d:''}${s.aac?', AAC: '+s.aac:''})\n`;
    (IEP[s.id]||'').split('\n').forEach(l=>m+=`    - ${l}\n`);
  });
  m+=`\n[설계 요청 사항]\n`;
  m+=`1. 수업 활동 2~3개 제시 (공통 활동 중심, 1학년·3학년 수준 차별화)\n`;
  m+=`2. 각 활동에서 위 학생들의 IEP 목표를 어떻게 삽입할지 구체적으로 제시\n`;
  m+=`3. AAC 사용 학생(박ㅇ·최ㅇ진·이ㅇ호)의 의사소통 지원 장면 포함\n`;
  m+=`4. 원래 성취기준과 수정된 성취기준을 함께 제시\n`;
  m+=`5. 평가 계획과 연계될 수 있도록 구성`;
  return m;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function doCopy(){
  const wd=SCHED.find(x=>x.w===S.week);
  const g1L=S.g1l.map(i=>wd?.[S.g1s]?.[i]).filter(Boolean);
  const g3L=S.g3l.map(i=>wd?.[S.g3s]?.[i]).filter(Boolean);
  const ss=STUS.filter(x=>S.stus.includes(x.id));
  navigator.clipboard.writeText(buildPrompt(wd,g1L,g3L,ss)).then(()=>{
    const b=document.getElementById("cpBtn");
    if(!b)return;
    b.className="copy-btn-big done";
    b.innerHTML=`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-6" stroke="var(--teal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> 복사 완료!`;
    setTimeout(()=>{
      b.className="copy-btn-big";
      b.innerHTML=`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="white" stroke-width="1.5"/><path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5" stroke="white" stroke-width="1.5"/></svg> 프롬프트 복사`;
    },2500);
  }).catch(()=>alert('복사에 실패했어요. 아래 텍스트를 직접 복사하세요.'));
}

/* ── 상호작용 ── */
function selWeek(w){S.week=w;S.g1s=null;S.g3s=null;S.g1l=[];S.g3l=[];render();}
function selSubj(g,k){if(g===1){S.g1s=k;S.g1l=[];}else{S.g3s=k;S.g3l=[];}render();}
function togL(g,i){if(g===1)S.g1l=S.g1l.includes(i)?S.g1l.filter(x=>x!==i):[...S.g1l,i];else S.g3l=S.g3l.includes(i)?S.g3l.filter(x=>x!==i):[...S.g3l,i];render();}
function togS(id){S.stus=S.stus.includes(id)?S.stus.filter(x=>x!==id):[...S.stus,id];render();}
function goTo(s){S.step=s;render();window.scrollTo({top:0,behavior:"smooth"});}
function jmp(s){const e=document.getElementById("pi"+s);if(e.classList.contains("done")||e.classList.contains("active"))goTo(s);}
function resetAll(){S={step:1,week:null,g1s:null,g3s:null,g1l:[],g3l:[],stus:[]};render();}

render();
</script>
</body>
</html>
