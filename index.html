<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어울림1반 수업 설계 도구</title>
<style>
  :root {
    --teal:#1D9E75;--tl:#E1F5EE;--td:#085041;
    --blue:#378ADD;--bl:#E6F1FB;--bd:#0C447C;
    --amber:#EF9F27;--al:#FAEEDA;--ad:#633806;
    --purple:#7F77DD;--pl:#EEEDFE;--pd:#3C3489;
    --red:#E24B4A;--rl:#FCEBEB;
    --g50:#F8F7F4;--g100:#F1EFE8;--g200:#D3D1C7;
    --g400:#888780;--g600:#5F5E5A;--g900:#2C2C2A;
    --rsm:6px;--rmd:10px;--rlg:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--g50);color:var(--g900);min-height:100vh}

  /* Header */
  .hd{background:#fff;border-bottom:1px solid var(--g200);padding:0 1.25rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
  .hd-l{display:flex;align-items:center;gap:9px}
  .hd-mark{width:28px;height:28px;background:var(--teal);border-radius:var(--rsm);display:flex;align-items:center;justify-content:center}
  .hd-mark svg{width:15px;height:15px}
  .hd-t{font-size:13px;font-weight:700;letter-spacing:-.3px}
  .hd-s{font-size:11px;color:var(--g400)}
  .api-btn{display:flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:99px;background:var(--g100);color:var(--g600);cursor:pointer;border:1px solid var(--g200);transition:all .15s;font-family:inherit}
  .api-btn:hover{background:var(--al);color:var(--ad);border-color:var(--amber)}
  .api-btn.ok{background:var(--tl);color:var(--td);border-color:var(--teal)}
  .sdot{width:7px;height:7px;border-radius:50%;background:var(--g400);flex-shrink:0}
  .api-btn.ok .sdot{background:var(--teal)}

  /* Modal */
  .mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;padding:1rem}
  .mbg.open{display:flex}
  .modal{background:#fff;border-radius:var(--rlg);padding:1.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal-t{font-size:15px;font-weight:700;margin-bottom:6px}
  .modal-d{font-size:13px;color:var(--g600);margin-bottom:1.1rem;line-height:1.7}
  .modal-d a{color:var(--blue);text-decoration:none}
  .modal-d a:hover{text-decoration:underline}
  .modal input{width:100%;padding:9px 11px;border:1.5px solid var(--g200);border-radius:var(--rsm);font-size:13px;font-family:monospace;background:var(--g50);outline:none;transition:border-color .15s}
  .modal input:focus{border-color:var(--teal);background:#fff}
  .modal-note{margin-top:8px;font-size:11px;color:var(--g400);line-height:1.6}
  .modal-acts{display:flex;gap:7px;margin-top:12px;justify-content:flex-end}

  /* Layout */
  .main{max-width:820px;margin:0 auto;padding:1.25rem 1rem 5rem}

  /* Progress */
  .prog{display:flex;background:#fff;border:1px solid var(--g200);border-radius:var(--rmd);overflow:hidden;margin-bottom:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .pi{flex:1;padding:10px 12px;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--g400);border-right:1px solid var(--g200);cursor:default;transition:all .2s}
  .pi:last-child{border-right:none}
  .pi.active{background:var(--tl);color:var(--td);font-weight:600}
  .pi.done{color:var(--teal);cursor:pointer}
  .pi.done:hover{background:var(--tl)}
  .pn{width:19px;height:19px;border-radius:50%;background:var(--g200);color:var(--g600);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .pi.active .pn,.pi.done .pn{background:var(--teal);color:#fff}
  .pl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media(max-width:480px){.pl{display:none}.pi{justify-content:center}}

  /* Card */
  .card{background:#fff;border:1px solid var(--g200);border-radius:var(--rlg);padding:1.1rem 1.2rem;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:.875rem;animation:fup .2s ease}
  @keyframes fup{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .ct2{font-size:14px;font-weight:700;margin-bottom:3px}
  .cd{font-size:13px;color:var(--g600);margin-bottom:1rem}

  /* Notice */
  .notice{display:flex;gap:8px;align-items:flex-start;background:var(--al);border:1px solid #FAC775;border-radius:var(--rmd);padding:10px 12px;margin-bottom:.875rem;font-size:13px;color:var(--ad)}

  /* Subject buttons */
  .glabel{font-size:11px;font-weight:700;letter-spacing:.4px;margin-bottom:7px;display:flex;align-items:center;gap:5px}
  .gdot{width:7px;height:7px;border-radius:50%}
  .srow{display:flex;gap:6px;flex-wrap:wrap}
  .sbtn{padding:6px 13px;border-radius:var(--rsm);border:1.5px solid var(--g200);background:#fff;cursor:pointer;font-size:13px;font-family:inherit;color:var(--g600);font-weight:500;transition:all .12s}
  .sbtn:hover{border-color:var(--g400);color:var(--g900)}
  .sbtn.g1s{border-color:var(--teal);background:var(--tl);color:var(--td)}
  .sbtn.g3s{border-color:var(--blue);background:var(--bl);color:var(--bd)}

  /* Two col */
  .tc{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.tc{grid-template-columns:1fr}}
  .chd{font-size:11px;font-weight:700;padding:5px 9px;border-radius:var(--rsm);margin-bottom:6px}
  .chd.g1{background:var(--tl);color:var(--td)}
  .chd.g3{background:var(--bl);color:var(--bd)}
  .slist{max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;padding-right:1px}
  .slist::-webkit-scrollbar{width:3px}
  .slist::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px}

  /* Lesson item */
  .li{display:flex;gap:8px;align-items:flex-start;padding:7px 9px;border:1.5px solid var(--g200);border-radius:var(--rsm);cursor:pointer;transition:all .1s;background:#fff}
  .li:hover{border-color:var(--g400);background:var(--g50)}
  .li.g1s{border-color:var(--teal);background:var(--tl)}
  .li.g3s{border-color:var(--blue);background:var(--bl)}
  .chk{width:15px;height:15px;border:2px solid var(--g200);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .1s}
  .li.g1s .chk{background:var(--teal);border-color:var(--teal)}
  .li.g3s .chk{background:var(--blue);border-color:var(--blue)}
  .tick{width:7px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:none}
  .li.g1s .tick,.li.g3s .tick{display:block}
  .li-u{font-size:10px;color:var(--g400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .li-t{font-size:12px;font-weight:600;line-height:1.35}
  .li-c{font-size:11px;color:var(--g400);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .li.g1s .li-u,.li.g1s .li-c{color:var(--teal)}
  .li.g3s .li-u,.li.g3s .li-c{color:var(--bd);opacity:.7}

  /* Students */
  .sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:7px}
  .sbtn2{display:flex;align-items:center;gap:8px;padding:9px 10px;border:1.5px solid var(--g200);border-radius:var(--rmd);background:#fff;cursor:pointer;font-family:inherit;text-align:left;transition:all .12s}
  .sbtn2:hover,.sbtn2.sel{border-color:var(--amber);background:var(--al)}
  .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
  .avt{background:#9FE1CB;color:var(--td)}
  .ava{background:#FAC775;color:var(--ad)}
  .avp{background:#F4C0D1;color:#72243E}
  .avb{background:#B5D4F4;color:var(--bd)}
  .avg{background:#C0DD97;color:#27500A}
  .sn{font-size:13px;font-weight:600}
  .sm{font-size:11px;color:var(--g600)}
  .aac-pill{display:inline-block;font-size:10px;padding:1px 5px;border-radius:99px;background:var(--pl);color:var(--pd);font-weight:600;margin-top:2px}

  /* IEP */
  .ilist{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .iitem{background:var(--pl);border-left:3px solid var(--purple);border-radius:0 var(--rsm) var(--rsm) 0;padding:7px 11px}
  .iname{font-size:11px;font-weight:700;color:var(--pd);margin-bottom:1px}
  .itext{font-size:12px;color:var(--g600);line-height:1.6}

  /* Chips */
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;font-size:11px;padding:3px 8px;border-radius:99px;font-weight:500}
  .ct{background:var(--tl);color:var(--td)}
  .cb{background:var(--bl);color:var(--bd)}
  .ca{background:var(--al);color:var(--ad)}

  /* Buttons */
  .brow{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;gap:7px}
  .bp{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;background:var(--teal);color:#fff;border:none;border-radius:var(--rsm);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
  .bp:hover{background:var(--td);transform:translateY(-1px)}
  .bp:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed;transform:none}
  .bg{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:#fff;color:var(--g600);border:1px solid var(--g200);border-radius:var(--rsm);cursor:pointer;font-size:12px;font-family:inherit;transition:all .12s}
  .bg:hover{background:var(--g100)}

  /* Generate button */
  .gen{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--teal),#185FA5);color:#fff;border:none;border-radius:var(--rmd);cursor:pointer;font-family:inherit;transition:all .15s;box-shadow:0 4px 14px rgba(29,158,117,.28);margin-bottom:10px}
  .gen:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 20px rgba(29,158,117,.33)}
  .gen:disabled{background:var(--g200);color:var(--g400);box-shadow:none;cursor:not-allowed;transform:none}
  .gen.stop{background:linear-gradient(135deg,#E24B4A,#993556);box-shadow:0 4px 14px rgba(226,75,74,.28)}

  /* Result */
  .rwrap{background:#fff;border:1px solid var(--g200);border-radius:var(--rlg);overflow:hidden;margin-bottom:.875rem}
  .rhd{padding:9px 13px;background:var(--g50);border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between}
  .rht{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
  .rbody{padding:1.1rem 1.2rem;font-size:14px;line-height:1.9;color:var(--g900);min-height:80px;white-space:pre-wrap}
  .rbody.stream::after{content:'▋';display:inline;animation:blink .7s step-end infinite;color:var(--teal)}
  @keyframes blink{50%{opacity:0}}
  .rbody h2{font-size:14px;font-weight:700;margin:1.1rem 0 .3rem;color:var(--td);border-bottom:1px solid var(--tl);padding-bottom:3px}
  .rbody h3{font-size:13px;font-weight:700;margin:.9rem 0 .25rem;color:var(--bd)}
  .rbody strong{font-weight:700}
  .rbody ul{margin-left:1.1rem;margin-top:.2rem}
  .rbody li{margin-bottom:.15rem}
  .rbody .taac{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:99px;background:var(--pl);color:var(--pd);vertical-align:middle;margin-right:2px}
  .rbody .tiep{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:99px;background:var(--tl);color:var(--td);vertical-align:middle;margin-right:2px}
  .empty-r{padding:2.5rem;text-align:center;color:var(--g400);font-size:13px}
  .copy-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:#fff;color:var(--g600);border:1px solid var(--g200);border-radius:var(--rsm);cursor:pointer;font-size:11px;font-family:inherit;transition:all .12s}
  .copy-btn:hover{background:var(--g100)}
  .copy-btn.done{background:var(--tl);color:var(--td);border-color:var(--teal)}

  /* Error */
  .err{background:var(--rl);border:1px solid var(--red);border-radius:var(--rmd);padding:10px 13px;font-size:13px;color:var(--red);margin-bottom:.875rem;display:none}
  .err.show{display:block}
  .divider{height:1px;background:var(--g200);margin:.875rem 0}
  .slabel{font-size:11px;font-weight:700;color:var(--g400);letter-spacing:.5px;margin-bottom:7px}
</style>
</head>
<body>

<header class="hd">
  <div class="hd-l">
    <div class="hd-mark">
      <svg viewBox="0 0 15 15" fill="none">
        <rect x="2" y="2" width="4.5" height="4.5" rx="1.2" fill="white" opacity=".9"/>
        <rect x="8.5" y="2" width="4.5" height="4.5" rx="1.2" fill="white" opacity=".55"/>
        <rect x="2" y="8.5" width="4.5" height="4.5" rx="1.2" fill="white" opacity=".55"/>
        <rect x="8.5" y="8.5" width="4.5" height="4.5" rx="1.2" fill="white" opacity=".9"/>
      </svg>
    </div>
    <div>
      <div class="hd-t">어울림1반 수업 설계 도구</div>
      <div class="hd-s">2026-1 · 1·3학년 혼합 특수학급</div>
    </div>
  </div>
  <button class="api-btn" id="apiBtn" onclick="openModal()">
    <div class="sdot"></div>
    <span id="apiTxt">API 키 설정</span>
  </button>
</header>

<!-- Modal -->
<div class="mbg" id="mbg" onclick="closeMO(event)">
  <div class="modal">
    <div class="modal-t">Anthropic API 키 설정</div>
    <div class="modal-d">
      API 키는 이 브라우저의 localStorage에만 저장되며 외부로 전송되지 않습니다.<br>
      키 발급: <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </div>
    <input type="password" id="keyIn" placeholder="sk-ant-api03-..." autocomplete="off"/>
    <div class="modal-note">🔒 키는 GitHub 저장소에 올라가지 않으며, 이 기기 브라우저에만 보관됩니다.</div>
    <div class="modal-acts">
      <button class="bg" onclick="closeMC()">취소</button>
      <button class="bp" onclick="saveKey()">저장</button>
    </div>
  </div>
</div>

<main class="main">
  <nav class="prog" id="prog">
    <div class="pi active" id="pi1" onclick="jmp(1)"><div class="pn" id="pn1">1</div><span class="pl">교과 선택</span></div>
    <div class="pi" id="pi2" onclick="jmp(2)"><div class="pn" id="pn2">2</div><span class="pl">차시 연계</span></div>
    <div class="pi" id="pi3" onclick="jmp(3)"><div class="pn" id="pn3">3</div><span class="pl">학생 선택</span></div>
    <div class="pi" id="pi4" onclick="jmp(4)"><div class="pn" id="pn4">4</div><span class="pl">수업 설계</span></div>
  </nav>
  <div class="err" id="errBox"></div>
  <div id="sc"></div>
</main>

const gk=()=>localStorage.getItem("aak")||"";
function saveKey(){
  const v=document.getElementById("keyIn").value.trim();
  if(!v){showErr("API 키를 입력해주세요.");return;}
  if(!v.startsWith("sk-ant-")){showErr("올바른 Anthropic API 키 형식이 아닙니다. (sk-ant-로 시작)");return;}
  localStorage.setItem("aak",v);closeMC();updKey();
}
function updKey(){
  const k=gk(),b=document.getElementById("apiBtn"),t=document.getElementById("apiTxt");
  if(k){b.className="api-btn ok";t.textContent="API 키 설정됨";}
  else{b.className="api-btn";t.textContent="API 키 설정";}
}
function openModal(){document.getElementById("keyIn").value=gk();document.getElementById("mbg").classList.add("open");}
function closeMC(){document.getElementById("mbg").classList.remove("open");}
function closeMO(e){if(e.target===document.getElementById("mbg"))closeMC();}

/* ── PROGRESS ── */
function updProg(){
  for(let i=1;i<=4;i++){
    const p=document.getElementById("pi"+i),n=document.getElementById("pn"+i);
    p.className="pi";
    if(i<S.step){p.classList.add("done");n.textContent="✓";}
    else if(i===S.step){p.classList.add("active");n.textContent=i;}
    else n.textContent=i;
  }
}

/* ── RENDER ── */
const G1S=["국어","수학"],G3S=["국어","수학","도덕","사회","과학","음악","미술"];
function render(){
  updProg();clearErr();
  const c=document.getElementById("sc");
  if(S.step===1)c.innerHTML=r1();
  else if(S.step===2)c.innerHTML=r2();
  else if(S.step===3)c.innerHTML=r3();
  else c.innerHTML=r4();
}

function r1(){
  return`<div class="card">
  <div class="ct2">융합할 교과 선택</div>
  <div class="cd">1학년 교과 1개, 3학년 교과 1개를 선택하세요.</div>
  <div class="glabel"><span class="gdot" style="background:var(--teal)"></span>1학년</div>
  <div class="srow" style="margin-bottom:1rem">${G1S.map(s=>`<button class="sbtn ${S.g1s===s?'g1s':''}" onclick="sel(1,'${s}')">${s}</button>`).join('')}</div>
  <div class="glabel"><span class="gdot" style="background:var(--blue)"></span>3학년</div>
  <div class="srow">${G3S.map(s=>`<button class="sbtn ${S.g3s===s?'g3s':''}" onclick="sel(3,'${s}')">${s}</button>`).join('')}</div>
  ${S.g1s&&S.g3s?`<div class="divider"></div><div class="chips"><span class="chip ct">1학년 ${S.g1s}</span><span style="color:var(--g400);font-size:16px;align-self:center">+</span><span class="chip cb">3학년 ${S.g3s}</span></div>`:''}
  <div class="brow"><div></div><button class="bp" ${S.g1s&&S.g3s?'':'disabled'} onclick="goTo(2)">차시 연계 →</button></div>
</div>`;}

function r2(){
  const g1d=CUR[`1학년_${S.g1s}`]||[],g3d=CUR[`3학년_${S.g3s}`]||[];
  const mkL=(d,g)=>d.map((l,i)=>`<div class="li ${g===1&&S.g1l.includes(i)?'g1s':g===3&&S.g3l.includes(i)?'g3s':''}" onclick="togL(${g},${i})"><div class="chk"><div class="tick"></div></div><div style="flex:1;min-width:0"><div class="li-u">${l.u}</div><div class="li-t">${l.t}</div><div class="li-c">${l.c||''}</div></div></div>`).join('');
  return`<div class="notice"><span>💡</span><span>연계가 어렵더라도 억지로 묶어도 괜찮아요. 각 학년에서 1개 이상 선택하면 됩니다.</span></div>
<div class="card">
  <div class="ct2">차시 연계 선택</div>
  <div class="cd">1학년 <b style="color:var(--teal)">${S.g1s}</b>와 3학년 <b style="color:var(--blue)">${S.g3s}</b>에서 연계할 차시를 선택하세요.</div>
  <div class="tc">
    <div><div class="chd g1">1학년 ${S.g1s} (${S.g1l.length}선택)</div><div class="slist">${mkL(g1d,1)}</div></div>
    <div><div class="chd g3">3학년 ${S.g3s} (${S.g3l.length}선택)</div><div class="slist">${mkL(g3d,3)}</div></div>
  </div>
  <div class="brow"><button class="bg" onclick="goTo(1)">← 이전</button><button class="bp" ${S.g1l.length&&S.g3l.length?'':'disabled'} onclick="goTo(3)">학생 선택 →</button></div>
</div>`;}

function r3(){
  const g1T=S.g1l.map(i=>CUR[`1학년_${S.g1s}`][i]?.t).filter(Boolean);
  const g3T=S.g3l.map(i=>CUR[`3학년_${S.g3s}`][i]?.t).filter(Boolean);
  const ip=S.stus.map(id=>{const s=STUS.find(x=>x.id===id);return`<div class="iitem"><div class="iname">${s.id} (${s.g}학년)</div><div class="itext">${IEP[id]||'IEP 없음'}</div></div>`;}).join('');
  return`<div class="card"><div class="slabel">연계 차시</div><div class="chips">${g1T.map(t=>`<span class="chip ct">1학년 · ${t}</span>`).join('')}${g3T.map(t=>`<span class="chip cb">3학년 · ${t}</span>`).join('')}</div></div>
<div class="card">
  <div class="ct2">수업 참여 학생 선택</div>
  <div class="cd">이 수업에 참여하는 학생을 선택하세요. 복수 선택 가능합니다.</div>
  <div class="sgrid">${STUS.map(s=>`<button class="sbtn2 ${S.stus.includes(s.id)?'sel':''}" onclick="togS('${s.id}')"><div class="av ${s.av}">${s.init}</div><div><div class="sn">${s.id}</div><div class="sm">${s.g}학년${s.d?' · '+s.d:''}</div>${s.aac?`<div class="aac-pill">AAC</div>`:''}</div></button>`).join('')}</div>
  ${S.stus.length?`<div class="divider"></div><div class="slabel">IEP 목표 확인</div><div class="ilist">${ip}</div>`:''}
  <div class="brow"><button class="bg" onclick="goTo(2)">← 이전</button><button class="bp" ${S.stus.length?'':'disabled'} onclick="goTo(4)">수업 설계하기 →</button></div>
</div>`;}

function r4(){
  const g1L=S.g1l.map(i=>CUR[`1학년_${S.g1s}`][i]).filter(Boolean);
  const g3L=S.g3l.map(i=>CUR[`3학년_${S.g3s}`][i]).filter(Boolean);
  const ss=STUS.filter(x=>S.stus.includes(x.id));
  const noK=!gk();
  const rb=S.res?md(S.res):`<div class="empty-r">아래 버튼을 눌러 수업을 생성하세요.</div>`;
  return`<div class="card"><div class="slabel" style="margin-bottom:5px">설계 요약</div>
  <div class="chips">${g1L.map(l=>`<span class="chip ct">1학년 ${S.g1s} · ${l.t}</span>`).join('')}${g3L.map(l=>`<span class="chip cb">3학년 ${S.g3s} · ${l.t}</span>`).join('')}${ss.map(s=>`<span class="chip ca">${s.id}</span>`).join('')}</div></div>
  ${noK?`<div class="notice">⚠️ API 키가 설정되지 않았어요. 우측 상단 <b>API 키 설정</b>을 눌러 입력하세요.</div>`:''}
  <button class="gen ${S.streaming?'stop':''}" id="genBtn" onclick="togGen()" ${noK?'disabled':''}>
    ${S.streaming?`<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="3.5" y="3.5" width="8" height="8" rx="1.5" fill="white"/></svg> 생성 중지`:`<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><polygon points="4,2.5 12,7.5 4,12.5" fill="white"/></svg> 수업 설계 생성`}
  </button>
  <div class="rwrap">
    <div class="rhd">
      <div class="rht"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="1.5" width="4" height="4" rx="1" fill="var(--teal)"/><rect x="7.5" y="1.5" width="4" height="4" rx="1" fill="var(--blue)" opacity=".55"/><rect x="1.5" y="7.5" width="4" height="4" rx="1" fill="var(--blue)" opacity=".55"/><rect x="7.5" y="7.5" width="4" height="4" rx="1" fill="var(--teal)"/></svg>수업 설계 결과</div>
      ${S.res&&!S.streaming?`<button class="copy-btn" id="cpBtn" onclick="cpRes()">복사</button>`:''}
    </div>
    <div class="rbody ${S.streaming?'stream':''}" id="rb">${rb}</div>
  </div>
  <div class="brow"><button class="bg" onclick="goTo(3)">← 이전</button><button class="bg" onclick="resetAll()">처음부터</button></div>`;}

/* ── MARKDOWN ── */
function md(t){
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\[AAC\]/g,'<span class="taac">AAC</span>')
    .replace(/\[IEP\]/g,'<span class="tiep">IEP</span>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*?<\/li>\n?)+/gs,'<ul>$&</ul>')
    .replace(/\n{2,}/g,'<br><br>')
    .replace(/\n/g,'<br>');}

/* ── STREAMING ── */
function buildMsg(g1L,g3L,ss){
  let m=`[어울림1반 융합 수업 설계 요청]\n\n■ 1학년 ${S.g1s} 연계 차시:\n`;
  g1L.forEach(l=>m+=`  · [${l.u}] ${l.t}\n    내용: ${l.c||l.t}\n`);
  m+=`\n■ 3학년 ${S.g3s} 연계 차시:\n`;
  g3L.forEach(l=>m+=`  · [${l.u}] ${l.t}\n    내용: ${l.c||l.t}\n`);
  m+=`\n■ 참여 학생 및 IEP:\n`;
  ss.forEach(s=>{
    m+=`  · ${s.id} (${s.g}학년${s.d?', '+s.d:''}${s.aac?', AAC: '+s.aac:''})\n`;
    (IEP[s.id]||'').split('\n').forEach(l=>m+=`    - ${l}\n`);
  });
  m+=`\n활동 2~3개를 마크다운으로 설계해주세요. AAC 장면에 [AAC], IEP 삽입 장면에 [IEP] 태그를 사용해주세요.`;
  return [{role:"user",content:m}];}

async function generate(){
  const key=gk();
  if(!key){showErr("API 키를 먼저 설정해주세요.");return;}
  const g1L=S.g1l.map(i=>CUR[`1학년_${S.g1s}`][i]).filter(Boolean);
  const g3L=S.g3l.map(i=>CUR[`3학년_${S.g3s}`][i]).filter(Boolean);
  const ss=STUS.filter(x=>S.stus.includes(x.id));
  S.res="";S.streaming=true;render();
  const rb=document.getElementById("rb");
  rb.innerHTML='';rb.className="rbody stream";
  ab=new AbortController();
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",signal:ab.signal,
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,stream:true,system:SYS,messages:buildMsg(g1L,g3L,ss)})
    });
    if(!res.ok){
      const e=await res.json().catch(()=>({}));
      if(res.status===401)throw new Error("API 키가 올바르지 않아요. 다시 확인해주세요.");
      if(res.status===429)throw new Error("요청이 너무 많습니다. 잠시 후 다시 시도해주세요.");
      throw new Error(e?.error?.message||`HTTP ${res.status}`);
    }
    const reader=res.body.getReader();const dec=new TextDecoder();let buf="";
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split("\n");buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith("data: "))continue;
        const data=line.slice(6).trim();if(data==="[DONE]")continue;
        try{const j=JSON.parse(data);
          if(j.type==="content_block_delta"&&j.delta?.type==="text_delta"){
            S.res+=j.delta.text;
            rb.innerHTML=md(S.res);
            rb.scrollIntoView({block:"end",behavior:"smooth"});
          }
        }catch(e){}
      }
    }
  }catch(e){if(e.name!=="AbortError")showErr(e.message);}
  S.streaming=false;ab=null;render();
  const rb2=document.getElementById("rb");if(rb2)rb2.className="rbody";
}
function togGen(){if(S.streaming){ab?.abort();S.streaming=false;render();}else generate();}
function cpRes(){
  navigator.clipboard.writeText(S.res).then(()=>{
    const b=document.getElementById("cpBtn");
    if(b){b.textContent="복사됨 ✓";b.className="copy-btn done";setTimeout(()=>{b.textContent="복사";b.className="copy-btn";},2000);}
  });
}

/* ── INTERACTIONS ── */
function sel(g,s){if(g===1)S.g1s=s;else S.g3s=s;render();}
function togL(g,i){if(g===1)S.g1l=S.g1l.includes(i)?S.g1l.filter(x=>x!==i):[...S.g1l,i];else S.g3l=S.g3l.includes(i)?S.g3l.filter(x=>x!==i):[...S.g3l,i];render();}
function togS(id){S.stus=S.stus.includes(id)?S.stus.filter(x=>x!==id):[...S.stus,id];render();}
function goTo(s){S.step=s;render();window.scrollTo({top:0,behavior:"smooth"});}
function jmp(s){const e=document.getElementById("pi"+s);if(e.classList.contains("done")||e.classList.contains("active"))goTo(s);}
function resetAll(){S={step:1,g1s:null,g3s:null,g1l:[],g3l:[],stus:[],res:"",streaming:false};render();}
function showErr(m){const e=document.getElementById("errBox");e.textContent="⚠ "+m;e.classList.add("show");}
function clearErr(){const e=document.getElementById("errBox");if(e)e.classList.remove("show");}

updKey();render();
</script>
